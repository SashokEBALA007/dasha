<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Даша — Бегалка с цветами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: pan-x pan-y; /* разрешаем жесты, но они будут перехватываться */
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        /* падающие розочки (декор) */
        .falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .falling-item {
            position: absolute;
            font-size: 24px;
            opacity: 0.7;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* главный контейнер */
        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            text-align: center;
            position: relative;
            z-index: 20;
            padding: 20px;
        }

        .screen {
            display: none;
        }

        .active-screen {
            display: block;
        }

        /* экран причин */
        .reasons-list {
            margin: 20px 0;
        }
        .reason-card {
            background: white;
            border-radius: 100px;
            padding: 10px 16px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .emoji {
            font-size: 28px;
            background: #ffe5e8;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .reason-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .btn {
            background: #ff4d6d;
            border: none;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.96);
        }

        /* игровое поле */
        .game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 5;
            background: #b0e57c;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: inset 0 0 0 3px white, 0 10px 20px rgba(0,0,0,0.1);
            touch-action: pan-x; /* чтобы скролл страницы не мешал */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255,255,240,0.9);
            border-radius: 60px;
            margin-top: 12px;
            font-weight: bold;
            font-size: 18px;
        }

        .control-hint {
            margin-top: 12px;
            font-size: 14px;
            color: #ff4d6d;
            background: #fff0f3;
            border-radius: 40px;
            padding: 8px;
        }
    </style>
</head>
<body>

<div class="falling-container" id="fallingContainer"></div>

<div class="container">
    <!-- ЭКРАН 1: Причины -->
    <div id="screenReasons" class="screen active-screen">
        <div class="heart-decoration" style="font-size: 32px; animation: pulse 1.5s infinite;">💖💗💖</div>
        <h1 style="color:#ff4d6d; font-size: 34px;">Почему Даша<br>самая лучшая?</h1>
        <div class="reasons-list">
            <div class="reason-card"><span class="emoji">🌟</span><span class="reason-text">Её зовут Даша</span></div>
            <div class="reason-card"><span class="emoji">👭</span><span class="reason-text">Она моя сестра</span></div>
            <div class="reason-card"><span class="emoji">💕</span><span class="reason-text">Я её люблю</span></div>
            <div class="reason-card"><span class="emoji">🎀</span><span class="reason-text">Даша, я очень старалась для тебя</span></div>
        </div>
        <button class="btn" id="startGameBtn">🏃‍♀️ ПОБЕЖАЛИ! 🏃‍♀️</button>
        <div class="control-hint">Веди пальцем влево-вправо, чтобы менять дорожку. Собирай цветы 🌸, уворачивайся от камней 🪨</div>
    </div>

    <!-- ЭКРАН 2: ИГРА -->
    <div id="screenGame" class="screen">
        <div class="game-area" id="gameArea">
            <canvas id="gameCanvas" width="600" height="1000"></canvas>
        </div>
        <div class="game-stats">
            <span>🌸 <span id="flowersCount">0</span></span>
            <span>🏃‍♀️ Дистанция: <span id="distance">0</span> м</span>
        </div>
        <button class="btn" id="backToReasonsBtn" style="background:#ffb3c6; color:#333; margin-top: 12px;">🏠 На главную</button>
        <div id="gameOverMsg" style="text-align:center; margin-top: 8px; font-weight:bold;"></div>
    </div>
</div>

<script>
    // ---------- ПАДАЮЩИЙ ДЕКОР ----------
    function createFallingItem() {
        const container = document.getElementById('fallingContainer');
        if (!container) return;
        const items = ['🌹', '⭐', '✨', '🌸', '💖'];
        const randomItem = items[Math.floor(Math.random() * items.length)];
        const element = document.createElement('div');
        element.className = 'falling-item';
        element.textContent = randomItem;
        const size = Math.floor(Math.random() * 25) + 20;
        element.style.fontSize = size + 'px';
        element.style.left = Math.random() * 100 + '%';
        const duration = Math.random() * 5 + 3;
        element.style.animationDuration = duration + 's';
        element.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(element);
        setTimeout(() => element.remove(), (duration + 2) * 1000);
    }
    setInterval(createFallingItem, 600);

    // ---------- ИГРА БЕГАЛКА ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Размеры дорожек
    let laneWidth = 0;
    let laneCount = 3;
    let playerLane = 1; // 0,1,2
    let gameRunning = false;
    let animationId = null;
    
    // Объекты: цветы и препятствия
    let objects = []; // { x, y, type: 'flower' или 'rock', lane }
    let scoreFlowers = 0;
    let distance = 0; // метры (увеличивается со временем)
    let baseSpeed = 2; // пикселей за кадр
    let lastTimestamp = 0;
    let frame = 0;
    
    // Настройки генерации
    let spawnCounter = 0;
    let spawnDelay = 45; // кадров между появлением объектов (чем меньше, тем чаще)
    
    // Размеры игрового поля
    let gameWidth = 600;
    let gameHeight = 1000;
    let playerSize = 50;
    let objectSize = 45;
    
    function resizeCanvas() {
        const container = document.getElementById('gameArea');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        gameWidth = canvas.width;
        gameHeight = canvas.height;
        laneWidth = gameWidth / laneCount;
        playerSize = laneWidth * 0.8;
        objectSize = laneWidth * 0.7;
        draw();
    }
    window.addEventListener('resize', () => { if (gameRunning) resizeCanvas(); else resizeCanvas(); });
    
    // Рисование
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, gameWidth, gameHeight);
        
        // дорожки
        for (let i = 0; i < laneCount; i++) {
            let x = i * laneWidth;
            ctx.fillStyle = i === playerLane ? '#c8e6b5' : '#e1f5d0';
            ctx.fillRect(x, 0, laneWidth, gameHeight);
            ctx.strokeStyle = '#fff8e7';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, 0, laneWidth, gameHeight);
        }
        
        // объекты
        for (let obj of objects) {
            let x = obj.lane * laneWidth + laneWidth/2;
            let y = obj.y;
            if (obj.type === 'flower') {
                ctx.font = `${objectSize}px "Segoe UI Emoji"`;
                ctx.fillStyle = 'hotpink';
                ctx.shadowBlur = 0;
                ctx.fillText('🌸', x - objectSize/2, y);
            } else {
                ctx.font = `${objectSize}px "Segoe UI Emoji"`;
                ctx.fillStyle = '#555';
                ctx.fillText('🪨', x - objectSize/2, y);
            }
        }
        
        // игрок (Даша)
        let playerX = playerLane * laneWidth + laneWidth/2;
        let playerY = gameHeight - 70;
        ctx.font = `${playerSize}px "Segoe UI Emoji"`;
        ctx.fillStyle = '#ff99cc';
        ctx.fillText('👧', playerX - playerSize/2, playerY);
        
        // надпись "Даша" под ногами?
        ctx.font = "bold 16px 'Quicksand'";
        ctx.fillStyle = '#a64d2e';
        ctx.shadowBlur = 0;
        ctx.fillText("Даша", playerX - 20, playerY + 10);
    }
    
    // Обновление объектов
    function updateGame() {
        if (!gameRunning) return;
        
        // увеличиваем дистанцию и скорость
        distance += 0.1;
        document.getElementById('distance').innerText = Math.floor(distance);
        let speed = baseSpeed + Math.floor(distance / 300);
        if (speed > 12) speed = 12;
        
        // двигаем объекты вверх
        for (let i = objects.length-1; i >= 0; i--) {
            objects[i].y += speed;
            if (objects[i].y > gameHeight + 100) {
                objects.splice(i,1);
            }
        }
        
        // проверка столкновений
        for (let obj of objects) {
            if (obj.lane === playerLane && obj.y + objectSize/2 > gameHeight-80 && obj.y - objectSize/2 < gameHeight-20) {
                // столкновение
                if (obj.type === 'rock') {
                    gameOver();
                    return;
                } else if (obj.type === 'flower') {
                    // собираем цветок
                    scoreFlowers++;
                    document.getElementById('flowersCount').innerText = scoreFlowers;
                    // удаляем этот цветок
                    const idx = objects.indexOf(obj);
                    if (idx !== -1) objects.splice(idx,1);
                    // приятный эффект (вибрация если можно)
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            }
        }
        
        // генерация новых объектов
        spawnCounter++;
        let dynamicDelay = Math.max(25, spawnDelay - Math.floor(distance / 400));
        if (spawnCounter >= dynamicDelay) {
            spawnCounter = 0;
            let lane = Math.floor(Math.random() * laneCount);
            let type = Math.random() < 0.6 ? 'flower' : 'rock'; // 60% цветы
            // чем дальше, тем больше камней
            if (distance > 200) type = Math.random() < 0.4 ? 'flower' : 'rock';
            if (distance > 500) type = Math.random() < 0.3 ? 'flower' : 'rock';
            objects.push({
                lane: lane,
                y: -30,
                type: type
            });
        }
        
        draw();
    }
    
    let gameLoop = null;
    function startGameLoop() {
        if (gameLoop) cancelAnimationFrame(gameLoop);
        function step() {
            if (!gameRunning) return;
            updateGame();
            gameLoop = requestAnimationFrame(step);
        }
        gameLoop = requestAnimationFrame(step);
    }
    
    function gameOver() {
        gameRunning = false;
        if (gameLoop) cancelAnimationFrame(gameLoop);
        gameLoop = null;
        document.getElementById('gameOverMsg').innerHTML = `💔 Игра окончена! Ты собрала ${scoreFlowers} цветов и пробежала ${Math.floor(distance)} м. 💔<br><button id="restartGameBtn" class="btn" style="background:#ff8fa3; margin-top:6px;">🔁 Сыграть ещё</button>`;
        const restartBtn = document.getElementById('restartGameBtn');
        if (restartBtn) restartBtn.onclick = () => resetAndStart();
    }
    
    function resetAndStart() {
        // сброс
        objects = [];
        scoreFlowers = 0;
        distance = 0;
        playerLane = 1;
        spawnCounter = 0;
        baseSpeed = 2;
        document.getElementById('flowersCount').innerText = '0';
        document.getElementById('distance').innerText = '0';
        document.getElementById('gameOverMsg').innerHTML = '';
        gameRunning = true;
        startGameLoop();
        draw();
    }
    
    // Управление свайпами (влево-вправо)
    let touchStartX = null;
    function handleTouchStart(e) {
        if (!gameRunning) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        touchStartX = e.touches[0].clientX - rect.left;
    }
    function handleTouchMove(e) {
        if (!gameRunning || touchStartX === null) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        let currentX = e.touches[0].clientX - rect.left;
        let deltaX = currentX - touchStartX;
        if (Math.abs(deltaX) > 20) {
            if (deltaX > 0 && playerLane < laneCount-1) {
                playerLane++;
            } else if (deltaX < 0 && playerLane > 0) {
                playerLane--;
            }
            touchStartX = currentX; // сброс для нового жеста
            draw();
        }
    }
    function handleTouchEnd(e) {
        touchStartX = null;
    }
    
    function initGame() {
        resizeCanvas();
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd);
        resetAndStart(); // сразу запускаем в фоне, но экран еще не показан
    }
    
    // Переключение экранов
    const screenReasonsDiv = document.getElementById('screenReasons');
    const screenGameDiv = document.getElementById('screenGame');
    const startBtn = document.getElementById('startGameBtn');
    const backBtn = document.getElementById('backToReasonsBtn');
    
    startBtn.addEventListener('click', () => {
        screenReasonsDiv.classList.remove('active-screen');
        screenGameDiv.classList.add('active-screen');
        resetAndStart();
    });
    backBtn.addEventListener('click', () => {
        gameRunning = false;
        if (gameLoop) cancelAnimationFrame(gameLoop);
        screenGameDiv.classList.remove('active-screen');
        screenReasonsDiv.classList.add('active-screen');
    });
    
    // запуск игры в фоне для инициализации
    initGame();
    // но игра не стартует до нажатия на "ПОБЕЖАЛИ", resetAndStart вызовется при старте
    // сделаем, чтобы canvas не был активен до начала игры
    let initialGameRunning = false;
    gameRunning = false;
    // переопределим resetAndStart для корректной работы
    const originalReset = resetAndStart;
    window.resetAndStart = function() {
        objects = [];
        scoreFlowers = 0;
        distance = 0;
        playerLane = 1;
        document.getElementById('flowersCount').innerText = '0';
        document.getElementById('distance').innerText = '0';
        document.getElementById('gameOverMsg').innerHTML = '';
        gameRunning = true;
        startGameLoop();
        draw();
    };
    resetAndStart = window.resetAndStart;
    
    // фикс: кнопка рестарта внутри gameOver работает
    window.addEventListener('load', () => {
        resizeCanvas();
        draw();
    });
</script>
</body>
</html>
