<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Даша — Бегалка с цветами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        .falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .falling-item {
            position: absolute;
            font-size: 24px;
            opacity: 0.7;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            text-align: center;
            position: relative;
            z-index: 20;
            padding: 20px;
        }

        .screen {
            display: none;
        }

        .active-screen {
            display: block;
        }

        .reasons-list {
            margin: 20px 0;
        }
        .reason-card {
            background: white;
            border-radius: 100px;
            padding: 10px 16px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .emoji {
            font-size: 28px;
            background: #ffe5e8;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .reason-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .btn {
            background: #ff4d6d;
            border: none;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.2s;
        }
        .btn:active {
            transform: scale(0.96);
        }

        .game-area {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #9fd3a3;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: inset 0 0 0 3px white, 0 10px 20px rgba(0,0,0,0.1);
            touch-action: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255,255,240,0.9);
            border-radius: 60px;
            margin-top: 12px;
            font-weight: bold;
            font-size: 18px;
        }

        .control-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 12px;
        }
        .control-btn {
            background: #ffb3c6;
            border: none;
            font-size: 28px;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 45%;
        }
        .control-btn:active {
            background: #ff8fa3;
            transform: scale(0.96);
        }
        .control-hint {
            margin-top: 12px;
            font-size: 14px;
            color: #ff4d6d;
            background: #fff0f3;
            border-radius: 40px;
            padding: 8px;
        }
    </style>
</head>
<body>

<div class="falling-container" id="fallingContainer"></div>

<div class="container">
    <div id="screenReasons" class="screen active-screen">
        <div style="font-size: 32px; animation: pulse 1.5s infinite;">💖💗💖</div>
        <h1 style="color:#ff4d6d; font-size: 34px;">Почему Даша<br>самая лучшая?</h1>
        <div class="reasons-list">
            <div class="reason-card"><span class="emoji">🌟</span><span class="reason-text">Её зовут Даша</span></div>
            <div class="reason-card"><span class="emoji">👭</span><span class="reason-text">Она моя сестра</span></div>
            <div class="reason-card"><span class="emoji">💕</span><span class="reason-text">Я её люблю</span></div>
            <div class="reason-card"><span class="emoji">🎀</span><span class="reason-text">Даша, я очень старалась для тебя</span></div>
        </div>
        <button class="btn" id="startGameBtn">🏃‍♀️ ПОБЕЖАЛИ! 🏃‍♀️</button>
        <div class="control-hint">👉 Нажимай на экран слева/справа или используй кнопки</div>
    </div>

    <div id="screenGame" class="screen">
        <div class="game-area" id="gameArea">
            <canvas id="gameCanvas"></canvas> <!-- убираем фиксированные width/height -->
        </div>
        <div class="game-stats">
            <span>🌸 <span id="flowersCount">0</span></span>
            <span>🏃‍♀️ Дистанция: <span id="distance">0</span> м</span>
        </div>
        <div class="control-buttons">
            <button class="control-btn" id="leftBtn">⬅️ Влево</button>
            <button class="control-btn" id="rightBtn">Вправо ➡️</button>
        </div>
        <button class="btn" id="backToReasonsBtn" style="background:#ffb3c6; color:#333; margin-top: 12px;">🏠 На главную</button>
        <div id="gameOverMsg" style="text-align:center; margin-top: 8px; font-weight:bold;"></div>
    </div>
</div>

<script>
    // декоративные падалки
    function createFallingItem() {
        const container = document.getElementById('fallingContainer');
        if (!container) return;
        const items = ['🌹', '⭐', '✨', '🌸', '💖'];
        const randomItem = items[Math.floor(Math.random() * items.length)];
        const element = document.createElement('div');
        element.className = 'falling-item';
        element.textContent = randomItem;
        const size = Math.floor(Math.random() * 25) + 20;
        element.style.fontSize = size + 'px';
        element.style.left = Math.random() * 100 + '%';
        const duration = Math.random() * 5 + 3;
        element.style.animationDuration = duration + 's';
        element.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(element);
        setTimeout(() => element.remove(), (duration + 2) * 1000);
    }
    setInterval(createFallingItem, 600);

    // ---------- ИГРА ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameRunning = false;

    let lanes = 3;
    let playerLane = 1;
    let objects = [];
    let flowers = 0;
    let distance = 0;
    let baseSpeed = 2.5;
    let spawnCounter = 0;
    let spawnDelay = 45;
    
    let canvasWidth = 0, canvasHeight = 0;
    let laneWidth = 0;
    let playerY = 0;
    let objectSize = 0;

    function updateDimensions() {
        const container = document.getElementById('gameArea');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        canvasWidth = canvas.width;
        canvasHeight = canvas.height;
        laneWidth = canvasWidth / lanes;
        playerY = canvasHeight - laneWidth * 0.6; // чуть выше нижнего края
        objectSize = laneWidth * 0.7;
    }

    function draw() {
        if (!ctx || canvasWidth === 0) return;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        
        // дорожки
        for (let i = 0; i < lanes; i++) {
            let x = i * laneWidth;
            ctx.fillStyle = (i === playerLane) ? '#c8e6b5' : '#e1f5d0';
            ctx.fillRect(x, 0, laneWidth, canvasHeight);
            ctx.strokeStyle = '#f5f0d1';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, 0, laneWidth, canvasHeight);
        }
        
        // объекты
        for (let obj of objects) {
            let x = obj.lane * laneWidth + laneWidth/2;
            let y = obj.y;
            ctx.font = `${objectSize}px "Segoe UI Emoji"`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if (obj.type === 'flower') {
                ctx.fillText('🌸', x, y);
            } else {
                ctx.fillText('🗿', x, y);
            }
        }
        
        // Даша
        let playerX = playerLane * laneWidth + laneWidth/2;
        ctx.font = `${laneWidth * 0.8}px "Segoe UI Emoji"`;
        ctx.fillStyle = '#ff99cc';
        ctx.fillText('👧', playerX, playerY);
        ctx.font = `bold ${Math.max(12, laneWidth * 0.2)}px 'Quicksand'`;
        ctx.fillStyle = '#a64d2e';
        ctx.fillText('Даша', playerX, playerY + laneWidth * 0.25);
        ctx.textAlign = "left";
    }
    
    function updateGame() {
        if (!gameRunning) return;
        distance += 0.12;
        document.getElementById('distance').innerText = Math.floor(distance);
        let speed = baseSpeed + Math.floor(distance / 250);
        if (speed > 10) speed = 10;
        
        // движение объектов
        for (let i = objects.length-1; i >= 0; i--) {
            objects[i].y += speed;
            if (objects[i].y > canvasHeight + objectSize) objects.splice(i,1);
        }
        
        // столкновения
        for (let obj of objects) {
            // зона игрока: от playerY - objectSize/2 до playerY + objectSize/2
            let playerTop = playerY - objectSize/1.8;
            let playerBottom = playerY + objectSize/1.8;
            if (obj.lane === playerLane && obj.y + objectSize/2 > playerTop && obj.y - objectSize/2 < playerBottom) {
                if (obj.type === 'rock') {
                    gameOver();
                    return;
                } else if (obj.type === 'flower') {
                    flowers++;
                    document.getElementById('flowersCount').innerText = flowers;
                    const idx = objects.indexOf(obj);
                    if (idx !== -1) objects.splice(idx,1);
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            }
        }
        
        // генерация
        spawnCounter++;
        let dynamicDelay = Math.max(30, spawnDelay - Math.floor(distance / 350));
        if (spawnCounter >= dynamicDelay) {
            spawnCounter = 0;
            let lane = Math.floor(Math.random() * lanes);
            let type = (Math.random() < 0.65 || distance < 150) ? 'flower' : 'rock';
            if (distance > 350) type = Math.random() < 0.45 ? 'flower' : 'rock';
            objects.push({ lane: lane, y: -30, type: type });
        }
        draw();
    }
    
    function gameLoop() {
        if (!gameRunning) return;
        updateGame();
        requestAnimationFrame(gameLoop);
    }
    
    function startGame() {
        if (gameRunning) return;
        gameRunning = true;
        objects = [];
        flowers = 0;
        distance = 0;
        playerLane = 1;
        spawnCounter = 0;
        document.getElementById('flowersCount').innerText = '0';
        document.getElementById('distance').innerText = '0';
        document.getElementById('gameOverMsg').innerHTML = '';
        updateDimensions();
        draw();
        gameLoop();
    }
    
    function gameOver() {
        gameRunning = false;
        document.getElementById('gameOverMsg').innerHTML = `💔 Игра окончена! Цветов: ${flowers}, Дистанция: ${Math.floor(distance)} м. 💔<br><button id="restartBtn" class="btn" style="background:#ff8fa3; margin-top:6px;">🔁 Сыграть ещё</button>`;
        const restartBtn = document.getElementById('restartBtn');
        if (restartBtn) restartBtn.onclick = () => { startGame(); };
    }
    
    // Управление
    function moveLeft() {
        if (!gameRunning) return;
        if (playerLane > 0) playerLane--;
        draw();
    }
    function moveRight() {
        if (!gameRunning) return;
        if (playerLane < lanes-1) playerLane++;
        draw();
    }
    
    function handleCanvasTouch(e) {
        if (!gameRunning) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        if (touchX < canvasWidth / 2) moveLeft();
        else moveRight();
    }
    
    function initGameUI() {
        updateDimensions();
        window.addEventListener('resize', () => {
            updateDimensions();
            draw();
        });
        canvas.addEventListener('touchstart', handleCanvasTouch, { passive: false });
        canvas.addEventListener('mousedown', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            if (mouseX < canvasWidth / 2) moveLeft();
            else moveRight();
        });
        draw();
    }
    
    // Кнопки
    document.getElementById('leftBtn').addEventListener('click', moveLeft);
    document.getElementById('rightBtn').addEventListener('click', moveRight);
    
    // Переключение экранов
    const screenReasons = document.getElementById('screenReasons');
    const screenGame = document.getElementById('screenGame');
    const startBtn = document.getElementById('startGameBtn');
    const backBtn = document.getElementById('backToReasonsBtn');
    
    startBtn.addEventListener('click', () => {
        screenReasons.classList.remove('active-screen');
        screenGame.classList.add('active-screen');
        startGame();
    });
    backBtn.addEventListener('click', () => {
        gameRunning = false;
        screenGame.classList.remove('active-screen');
        screenReasons.classList.add('active-screen');
    });
    
    initGameUI();
</script>
</body>
</html>
